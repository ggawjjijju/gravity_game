<!DOCTYPE html>
<html>

<head>
    <title>Gravity Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="scoreBoard">
    <h2>TOP 5</h2>
    <ol id="rankList"></ol>
</div>
<div id="menu">
    <h1>Gravity Game</h1>
    <button id="startButton">Start</button>
</div>

<div id="game">
    <div id="point">0</div>
    <div id="player"></div>
</div>

<div id="gameover">
    <h1>GAME OVER</h1>
    <h2 id="finalScore">Score: 0</h2>
    <button id="restartButton">Restart</button>
</div>

<script type="module" src="game.js"></script>

</body>
</html>
